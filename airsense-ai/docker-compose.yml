services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/airsense.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/artifacts:/app/artifacts
      - backend-db:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-db:
