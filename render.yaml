services:
  - type: web
    name: airsense-ai
    runtime: docker
    dockerfilePath: ./airsense-ai/Dockerfile
    dockerContext: ./airsense-ai
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: AirSense AI
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: true
      - key: DATABASE_URL
        value: sqlite:///./airsense.db
      - key: CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
