services:
  - type: web
    name: airsense-ai-api
    runtime: python
    rootDir: airsense-ai/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: AirSense AI
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEMO_MODE
        value: true
      - key: CORS_ORIGINS
        value: https://airsense-ai.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: SECRET_KEY
        generateValue: true
      - key: WAQI_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: airsense-ai-db
          property: connectionString

  - type: web
    name: airsense-ai
    runtime: static
    rootDir: airsense-ai/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://airsense-ai-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: airsense-ai-db
    plan: free
    databaseName: airsense_ai
    user: airsense_ai
